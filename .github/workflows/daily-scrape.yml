name: Daily Stock Data Scraper

on:
  # 禁用定时触发——改为 ArkClaw 实例本地 cron 执行，避免 IP 变动触发 TuShare 限制
  # schedule:
  #   - cron: '35 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  scrape-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install akshare pandas tushare

      # 爬虫只保存JSON，不覆盖TypeScript常量（DEFAULT_ZT_POOL是昨日数据）
      - name: Run scraper
        run: python python_scripts/akshare_zt.py --json-only
        env:
          TZ: Asia/Shanghai

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps and build
        run: npm ci && npm run build
        env:
          TZ: Asia/Shanghai

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
